# Configurações de Ambiente — ACDG Frontend
# Este arquivo é a fonte de verdade para gerar os arquivos .env de compilação.

# Valores compartilhados entre todos os ambientes
shared_config: &shared_config
  OIDC_ISSUER: "https://auth.acdgbrasil.com.br"
  OIDC_CLIENT_ID: "363110312318140539"
  # Escopo obrigatório para o Zitadel + Backend (Resource ID injetado)
  OIDC_SCOPES: "openid profile email offline_access urn:zitadel:iam:org:project:id:363109883022671995:aud"
  # Esquema de URL customizado para Desktop/Mobile
  CUSTOM_SCHEME: "com.acdg.system"

environments:
  # Ambiente de Desenvolvimento Local (Desktop/Mobile/Web)
  development:
    <<: *shared_config
    BFF_BASE_URL: "http://localhost:8080"
    OIDC_WEB_REDIRECT_URI: "http://localhost:5000/callback"
    OIDC_WEB_POST_LOGOUT_URI: "http://localhost:5000"

  # Ambiente de Produção
  production:
    <<: *shared_config
    BFF_BASE_URL: "https://bff.acdgbrasil.com.br"
    OIDC_WEB_REDIRECT_URI: "https://social-care.acdgbrasil.com.br/callback"
    OIDC_WEB_POST_LOGOUT_URI: "https://social-care.acdgbrasil.com.br"

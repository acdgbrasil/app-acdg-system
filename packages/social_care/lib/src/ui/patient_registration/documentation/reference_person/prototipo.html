<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conecta Raros — Cadastro Pessoa de Referência</title>
<link href="https://cdn.jsdelivr.net/npm/satoshi@1.0.0/css/satoshi.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F2E2C4;
  --bg-card:#FAF0E0;
  --brown:#261D11;
  --brown-50:rgba(38,29,17,0.5);
  --brown-20:rgba(38,29,17,0.2);
  --brown-10:rgba(38,29,17,0.1);
  --green:#4F8448;
  --green-light:#6BA362;
  --red:#A6290D;
  --red-light:#C4441F;
  --white:#FFFBF4;
  --font-heading:'Satoshi',system-ui,sans-serif;
  --font-body:'Playfair Display',Georgia,serif;
}

html{font-size:16px}
body{
  background:var(--bg);
  color:var(--brown);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

nav{
  display:flex;
  align-items:center;
  gap:24px;
  padding:24px 48px;
}
nav .menu-icon{width:28px;height:20px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
nav .menu-icon span{display:block;height:2.5px;background:var(--brown);border-radius:2px}
nav a{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:16px;
  color:var(--brown);
  text-decoration:none;
  opacity:0.6;
  transition:opacity 0.2s;
}
nav a:hover{opacity:1}
nav a.active{opacity:1;text-decoration:underline;text-underline-offset:4px}

.page-header{
  padding:16px 48px 32px;
}
.page-header h1{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:clamp(36px,5vw,64px);
  letter-spacing:-1.5px;
  line-height:1.1;
}

.stepper-container{
  padding:0 48px 32px;
  display:flex;
  align-items:center;
  gap:0;
}
.step-item{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  transition:opacity 0.3s;
}
.step-item.disabled{opacity:0.35;pointer-events:none}
.step-item.completed .step-num{background:var(--green);color:var(--white);border-color:var(--green)}
.step-item.active .step-num{background:var(--brown);color:var(--bg);border-color:var(--brown)}
.step-num{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-heading);font-weight:700;font-size:14px;
  border:2px solid var(--brown-20);
  color:var(--brown-50);
  background:transparent;
  transition:all 0.3s;
  flex-shrink:0;
}
.step-label{
  font-family:var(--font-heading);
  font-weight:500;
  font-size:13px;
  color:var(--brown);
  white-space:nowrap;
}
.step-line{
  flex:1;
  height:1.5px;
  background:var(--brown-20);
  margin:0 16px;
  min-width:24px;
  position:relative;
}
.step-line::after{
  content:'';
  position:absolute;
  left:0;top:0;height:100%;
  background:var(--green);
  width:0;
  transition:width 0.5s ease;
}
.step-line.filled::after{width:100%}

.form-area{
  flex:1;
  padding:0 48px 24px;
  display:flex;
  flex-direction:column;
}

.step-panel{
  display:none;
  animation:fadeIn 0.35s ease;
}
.step-panel.visible{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-title{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--brown-50);
  margin-bottom:20px;
  padding-bottom:8px;
  border-bottom:1px solid var(--brown-10);
}

.fields-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:28px 40px;
  margin-bottom:32px;
}
.fields-grid.three-col{grid-template-columns:1fr 1fr 1fr}
.field-full{grid-column:1/-1}

.field-group{position:relative}
.field-group label{
  display:block;
  font-family:var(--font-heading);
  font-weight:700;
  font-size:18px;
  color:var(--brown);
  margin-bottom:4px;
}
.field-group label .req{
  color:var(--red);
  font-size:12px;
  vertical-align:super;
  margin-left:2px;
}
.field-group input,
.field-group select{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1.5px solid var(--brown-20);
  padding:8px 0;
  font-family:var(--font-body);
  font-style:italic;
  font-weight:300;
  font-size:16px;
  color:var(--brown);
  outline:none;
  transition:border-color 0.25s;
}
.field-group input::placeholder{color:var(--brown-50);font-style:italic}
.field-group input:focus,
.field-group select:focus{border-bottom-color:var(--brown)}
.field-group select{
  -webkit-appearance:none;
  appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23261D11' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 4px center;
  cursor:pointer;
}
.field-group .field-hint{
  font-family:var(--font-body);
  font-size:12px;
  color:var(--brown-50);
  margin-top:4px;
  font-style:italic;
}
.field-group .field-error{
  font-family:var(--font-heading);
  font-size:12px;
  color:var(--red);
  margin-top:4px;
  display:none;
}
.field-group.has-error input{border-bottom-color:var(--red)}
.field-group.has-error .field-error{display:block}
.field-group.valid input{border-bottom-color:var(--green)}

.radio-group{
  display:flex;
  align-items:center;
  gap:24px;
  padding:8px 0;
}
.radio-option{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-family:var(--font-body);
  font-size:16px;
  color:var(--brown-50);
}
.radio-option input[type="radio"]{
  -webkit-appearance:none;
  appearance:none;
  width:20px;height:20px;border-radius:50%;
  border:1.5px solid var(--brown);
  cursor:pointer;
  position:relative;
  flex-shrink:0;
}
.radio-option input[type="radio"]:checked{background:var(--brown)}
.radio-option input[type="radio"]:checked::after{
  content:'';position:absolute;
  width:6px;height:6px;background:var(--bg);
  border-radius:50%;top:50%;left:50%;
  transform:translate(-50%,-50%);
}

.diag-card{
  background:var(--bg-card);
  border:1px solid var(--brown-10);
  border-radius:12px;
  padding:20px;
  margin-bottom:16px;
  position:relative;
}
.diag-card .remove-btn{
  position:absolute;top:12px;right:12px;
  background:none;border:none;cursor:pointer;
  color:var(--red);font-size:18px;
  font-family:var(--font-heading);font-weight:700;
  opacity:0.6;transition:opacity 0.2s;
}
.diag-card .remove-btn:hover{opacity:1}

.add-diag-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:none;
  border:1.5px dashed var(--brown-20);
  border-radius:10px;
  padding:12px 20px;
  font-family:var(--font-heading);
  font-weight:500;
  font-size:14px;
  color:var(--brown-50);
  cursor:pointer;
  transition:all 0.2s;
}
.add-diag-btn:hover{border-color:var(--brown);color:var(--brown)}

.button-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 48px 36px;
  margin-top:auto;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:14px 32px;
  border-radius:100px;
  font-family:var(--font-body);
  font-weight:500;
  font-style:italic;
  font-size:16px;
  letter-spacing:0.5px;
  cursor:pointer;
  border:none;
  transition:all 0.25s;
}
.btn-primary{
  background:var(--green);
  color:var(--bg);
  box-shadow:2px 2px 8px rgba(0,0,0,0.12);
}
.btn-primary:hover{background:var(--green-light);transform:translateY(-1px)}
.btn-secondary{
  background:transparent;
  color:var(--brown);
  border:1.5px solid var(--brown-20);
}
.btn-secondary:hover{border-color:var(--brown)}
.btn-danger{
  background:var(--red);
  color:var(--bg);
  box-shadow:2px 2px 8px rgba(0,0,0,0.12);
}
.btn-danger:hover{background:var(--red-light)}
.btn:disabled{opacity:0.4;pointer-events:none}
.btn svg{width:18px;height:18px}

.legend{
  font-family:var(--font-heading);
  font-size:12px;
  color:var(--brown-50);
  margin-bottom:24px;
}
.legend .req{color:var(--red);font-weight:700}

.review-section{margin-bottom:28px}
.review-section h3{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--brown-50);
  margin-bottom:12px;
  padding-bottom:6px;
  border-bottom:1px solid var(--brown-10);
}
.review-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 32px;
}
.review-item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid var(--brown-10);
}
.review-item .rlabel{
  font-family:var(--font-heading);
  font-size:13px;
  font-weight:500;
  color:var(--brown-50);
}
.review-item .rvalue{
  font-family:var(--font-body);
  font-size:14px;
  color:var(--brown);
  text-align:right;
}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:var(--white);
  font-family:var(--font-heading);font-weight:500;font-size:14px;
  padding:12px 28px;border-radius:100px;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  transition:transform 0.4s ease;z-index:100;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  nav,.page-header,.stepper-container,.form-area,.button-bar{padding-left:20px;padding-right:20px}
  .fields-grid,.fields-grid.three-col{grid-template-columns:1fr}
  .review-grid{grid-template-columns:1fr}
  .page-header h1{font-size:32px}
  .step-label{display:none}
}
</style>
</head>
<body>

<nav>
  <div class="menu-icon"><span></span><span></span><span></span></div>
  <a href="#">Famílias</a>
  <a href="#" class="active">Cadastro</a>
</nav>

<div class="page-header">
  <h1>Pessoa de Referência</h1>
</div>

<div class="stepper-container" id="stepper"></div>

<div class="form-area" id="formArea"></div>

<div class="button-bar">
  <button class="btn btn-secondary" id="btnBack" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar
  </button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()">
    Próximo
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const STEPS=[
  {id:0,label:'Dados pessoais',icon:'1'},
  {id:1,label:'Documentos & nascimento',icon:'2'},
  {id:2,label:'Endereço',icon:'3'},
  {id:3,label:'Diagnósticos',icon:'4'},
];

const UFS = ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO'];

let current = 0;
let diagCount = 1;
let formData = {};

function buildStepper(){
  const c=document.getElementById('stepper');
  c.innerHTML='';
  STEPS.forEach((s,i)=>{
    const item=document.createElement('div');
    item.className='step-item'+(i===current?' active':'')+(i<current?' completed':'')+(i>current?' disabled':'');
    item.onclick=()=>{if(i<=current)goTo(i)};
    const check=i<current?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':s.icon;
    item.innerHTML=`<div class="step-num">${check}</div><span class="step-label">${s.label}</span>`;
    c.appendChild(item);
    if(i<STEPS.length-1){
      const line=document.createElement('div');
      line.className='step-line'+(i<current?' filled':'');
      c.appendChild(line);
    }
  });
}

function selectOpt(name,val){
  formData[name]=val;
  document.querySelectorAll(`[data-radio="${name}"]`).forEach(el=>{
    el.querySelector('input').checked = el.dataset.val===val;
  });
}

function buildStep0(){
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="section-title">Identificação</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Nome <span class="req">*</span></label>
        <input type="text" placeholder="Primeiro nome" data-field="firstName" oninput="save(this)" value="${fd('firstName')}">
      </div>
      <div class="field-group">
        <label>Sobrenome <span class="req">*</span></label>
        <input type="text" placeholder="Sobrenome completo" data-field="lastName" oninput="save(this)" value="${fd('lastName')}">
      </div>
      <div class="field-group">
        <label>Nome social</label>
        <input type="text" placeholder="Se possuir" data-field="socialName" oninput="save(this)" value="${fd('socialName')}">
        <span class="field-hint">Preencha apenas se diferente do nome civil</span>
      </div>
      <div class="field-group">
        <label>Nome da mãe <span class="req">*</span></label>
        <input type="text" placeholder="Nome completo da mãe" data-field="motherName" oninput="save(this)" value="${fd('motherName')}">
      </div>
    </div>
    <div class="section-title">Informações adicionais</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Nacionalidade <span class="req">*</span></label>
        <select data-field="nationality" onchange="save(this)">
          <option value="" disabled ${!fd('nationality')?'selected':''}>Selecione</option>
          <option value="brasileiro" ${fd('nationality')==='brasileiro'?'selected':''}>Brasileiro(a)</option>
          <option value="estrangeiro" ${fd('nationality')==='estrangeiro'?'selected':''}>Estrangeiro(a)</option>
          <option value="naturalizado" ${fd('nationality')==='naturalizado'?'selected':''}>Naturalizado(a)</option>
        </select>
      </div>
      <div class="field-group">
        <label>Sexo <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option" data-radio="sex" data-val="masculino" onclick="selectOpt('sex','masculino')">
            <input type="radio" name="sex" ${fd('sex')==='masculino'?'checked':''}> Masculino
          </label>
          <label class="radio-option" data-radio="sex" data-val="feminino" onclick="selectOpt('sex','feminino')">
            <input type="radio" name="sex" ${fd('sex')==='feminino'?'checked':''}> Feminino
          </label>
        </div>
      </div>
      <div class="field-group">
        <label>Telefone</label>
        <input type="text" placeholder="(00) 00000-0000" data-field="phone" oninput="maskPhone(this);save(this)" value="${fd('phone')}" maxlength="15">
      </div>
    </div>
  `;
}

function buildStep1(){
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="section-title">Documentos civis</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>CPF</label>
        <input type="text" placeholder="000.000.000-00" data-field="cpf" oninput="maskCPF(this);save(this)" value="${fd('cpf')}" maxlength="14">
      </div>
      <div class="field-group">
        <label>NIS</label>
        <input type="text" placeholder="00000000000" data-field="nis" oninput="save(this)" value="${fd('nis')}" maxlength="11">
      </div>
    </div>
    <div class="section-title">Registro Geral (RG)</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Número do RG</label>
        <input type="text" placeholder="Número do documento" data-field="rgNumber" oninput="save(this)" value="${fd('rgNumber')}">
      </div>
      <div class="field-group">
        <label>UF do RG</label>
        <select data-field="rgState" onchange="save(this)">
          <option value="" disabled ${!fd('rgState')?'selected':''}>Selecione</option>
          ${UFS.map(u=>`<option value="${u}" ${fd('rgState')===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <label>Órgão emissor</label>
        <input type="text" placeholder="Ex: SSP, DETRAN" data-field="rgAgency" oninput="save(this)" value="${fd('rgAgency')}">
      </div>
      <div class="field-group">
        <label>Data de emissão</label>
        <input type="date" data-field="rgIssueDate" onchange="save(this)" value="${fd('rgIssueDate')}">
      </div>
    </div>
    <div class="section-title">Nascimento</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Data de nascimento <span class="req">*</span></label>
        <input type="date" data-field="birthDate" onchange="save(this)" value="${fd('birthDate')}">
      </div>
    </div>
  `;
}

function buildStep2(){
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="section-title">Tipo de moradia</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>O endereço é um abrigo? <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option" data-radio="isShelter" data-val="sim" onclick="selectOpt('isShelter','sim')">
            <input type="radio" name="isShelter" ${fd('isShelter')==='sim'?'checked':''}> Sim
          </label>
          <label class="radio-option" data-radio="isShelter" data-val="nao" onclick="selectOpt('isShelter','nao')">
            <input type="radio" name="isShelter" ${fd('isShelter')==='nao'?'checked':''}> Não
          </label>
        </div>
      </div>
      <div class="field-group">
        <label>Localização do domicílio <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option" data-radio="residenceLocation" data-val="urbano" onclick="selectOpt('residenceLocation','urbano')">
            <input type="radio" name="residenceLocation" ${fd('residenceLocation')==='urbano'?'checked':''}> Urbano
          </label>
          <label class="radio-option" data-radio="residenceLocation" data-val="rural" onclick="selectOpt('residenceLocation','rural')">
            <input type="radio" name="residenceLocation" ${fd('residenceLocation')==='rural'?'checked':''}> Rural
          </label>
        </div>
      </div>
    </div>
    <div class="section-title">Endereço</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>CEP</label>
        <input type="text" placeholder="00000-000" data-field="cep" oninput="maskCEP(this);save(this)" value="${fd('cep')}" maxlength="9">
        <span class="field-hint">Preencha o CEP para autocompletar o endereço</span>
      </div>
      <div class="field-group">
        <label>Endereço</label>
        <input type="text" placeholder="Rua, Avenida..." data-field="street" oninput="save(this)" value="${fd('street')}">
      </div>
      <div class="field-group">
        <label>Número</label>
        <input type="text" placeholder="Nº" data-field="number" oninput="save(this)" value="${fd('number')}">
      </div>
      <div class="field-group">
        <label>Complemento</label>
        <input type="text" placeholder="Apto, bloco..." data-field="complement" oninput="save(this)" value="${fd('complement')}">
      </div>
      <div class="field-group">
        <label>Bairro</label>
        <input type="text" placeholder="Nome do bairro" data-field="neighborhood" oninput="save(this)" value="${fd('neighborhood')}">
      </div>
      <div class="field-group">
        <label>UF <span class="req">*</span></label>
        <select data-field="state" onchange="save(this)">
          <option value="" disabled ${!fd('state')?'selected':''}>Selecione</option>
          ${UFS.map(u=>`<option value="${u}" ${fd('state')===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <label>Cidade <span class="req">*</span></label>
        <input type="text" placeholder="Nome da cidade" data-field="city" oninput="save(this)" value="${fd('city')}">
      </div>
    </div>
  `;
}

function buildDiagCard(i){
  return `
    <div class="diag-card" id="diag-${i}">
      ${i>0?`<button class="remove-btn" onclick="removeDiag(${i})">✕</button>`:''}
      <div class="fields-grid">
        <div class="field-group">
          <label>Código CID <span class="req">*</span></label>
          <input type="text" placeholder="Ex: Q87.1" data-field="diag_icd_${i}" oninput="save(this)" value="${fd('diag_icd_'+i)}">
          <span class="field-hint">Classificação Internacional de Doenças</span>
        </div>
        <div class="field-group">
          <label>Data do diagnóstico <span class="req">*</span></label>
          <input type="date" data-field="diag_date_${i}" onchange="save(this)" value="${fd('diag_date_'+i)}">
        </div>
        <div class="field-group field-full">
          <label>Descrição <span class="req">*</span></label>
          <input type="text" placeholder="Descrição do diagnóstico" data-field="diag_desc_${i}" oninput="save(this)" value="${fd('diag_desc_'+i)}">
        </div>
      </div>
    </div>
  `;
}

function buildStep3(){
  let cards='';
  for(let i=0;i<diagCount;i++) cards+=buildDiagCard(i);
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório — Pelo menos 1 diagnóstico é necessário</p>
    <div class="section-title">Diagnósticos iniciais</div>
    <div id="diagContainer">${cards}</div>
    <button class="add-diag-btn" onclick="addDiag()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Adicionar diagnóstico
    </button>
  `;
}

function fd(key){ return formData[key]||'' }
function save(el){ formData[el.dataset?.field || el.getAttribute('data-field')]=el.value }

function maskCPF(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>3) v=v.slice(0,3)+'.'+v.slice(3);
  if(v.length>7) v=v.slice(0,7)+'.'+v.slice(7);
  if(v.length>11) v=v.slice(0,11)+'-'+v.slice(11);
  el.value=v.slice(0,14);
}
function maskCEP(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>5) v=v.slice(0,5)+'-'+v.slice(5);
  el.value=v.slice(0,9);
}
function maskPhone(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>0) v='('+v;
  if(v.length>3) v=v.slice(0,3)+') '+v.slice(3);
  if(v.length>10) v=v.slice(0,10)+'-'+v.slice(10);
  el.value=v.slice(0,15);
}

function addDiag(){
  diagCount++;
  document.getElementById('diagContainer').insertAdjacentHTML('beforeend',buildDiagCard(diagCount-1));
}
function removeDiag(i){
  const card=document.getElementById('diag-'+i);
  if(card){card.remove();['icd','date','desc'].forEach(k=>delete formData['diag_'+k+'_'+i])}
}

function render(){
  buildStepper();
  const area=document.getElementById('formArea');
  const builders=[buildStep0,buildStep1,buildStep2,buildStep3];
  area.innerHTML=`<div class="step-panel visible">${builders[current]()}</div>`;

  const back=document.getElementById('btnBack');
  const next=document.getElementById('btnNext');
  back.style.visibility=current===0?'hidden':'visible';

  if(current===STEPS.length-1){
    next.innerHTML='Salvar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M5 13l4 4L19 7"/></svg>';
    next.className='btn btn-primary';
  }else{
    next.innerHTML='Próximo <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    next.className='btn btn-primary';
  }
}

function goTo(step){
  current=step;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  if(current>0){current--;render();window.scrollTo({top:0,behavior:'smooth'})}
}

function goNext(){
  if(current<STEPS.length-1){
    current++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  }else{
    showToast('Cadastro salvo com sucesso!');
    buildPayload();
  }
}

function buildPayload(){
  const p={
    personId:'generated-uuid',
    prRelationshipId:'generated-uuid',
    personalData:{
      firstName:fd('firstName'),
      lastName:fd('lastName'),
      motherName:fd('motherName'),
      nationality:fd('nationality'),
      sex:fd('sex'),
      socialName:fd('socialName')||null,
      birthDate:fd('birthDate'),
      phone:fd('phone')?fd('phone').replace(/\D/g,''):null,
    },
    civilDocuments:{
      cpf:fd('cpf')?fd('cpf').replace(/\D/g,''):null,
      nis:fd('nis')||null,
      rgDocument:fd('rgNumber')?{
        number:fd('rgNumber'),
        issuingState:fd('rgState'),
        issuingAgency:fd('rgAgency'),
        issueDate:fd('rgIssueDate'),
      }:null,
    },
    address:{
      isShelter:fd('isShelter')==='sim',
      residenceLocation:fd('residenceLocation'),
      cep:fd('cep')?fd('cep').replace(/\D/g,''):null,
      street:fd('street')||null,
      number:fd('number')||null,
      complement:fd('complement')||null,
      neighborhood:fd('neighborhood')||null,
      state:fd('state'),
      city:fd('city'),
    },
    initialDiagnoses:[],
  };
  for(let i=0;i<diagCount;i++){
    if(fd('diag_icd_'+i)){
      p.initialDiagnoses.push({
        icdCode:fd('diag_icd_'+i),
        date:fd('diag_date_'+i),
        description:fd('diag_desc_'+i),
      });
    }
  }
  console.log('POST /api/v1/patients payload:',JSON.stringify(p,null,2));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

render();
</script>
</body>
</html>

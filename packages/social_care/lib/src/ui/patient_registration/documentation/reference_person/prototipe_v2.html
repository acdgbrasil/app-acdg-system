<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conecta Raros — Cadastro</title>
<link href="https://cdn.jsdelivr.net/npm/satoshi@1.0.0/css/satoshi.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#F2E2C4;
  --bg-card:#FAF0E0;
  --brown:#261D11;
  --brown-50:rgba(38,29,17,0.5);
  --brown-20:rgba(38,29,17,0.2);
  --brown-10:rgba(38,29,17,0.1);
  --green:#4F8448;
  --green-light:#6BA362;
  --red:#A6290D;
  --red-light:#C4441F;
  --white:#FFFBF4;
  --font-heading:'Satoshi',system-ui,sans-serif;
  --font-body:'Playfair Display',Georgia,serif;
}

html{font-size:16px}
body{
  background:var(--bg);
  color:var(--brown);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── NAV ── */
nav{
  display:flex;
  align-items:center;
  gap:24px;
  padding:20px 48px;
}
nav .menu-icon{width:28px;height:20px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
nav .menu-icon span{display:block;height:2.5px;background:var(--brown);border-radius:2px}
nav a{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:16px;
  color:var(--brown);
  text-decoration:none;
  opacity:0.6;
  transition:opacity 0.2s;
}
nav a:hover{opacity:1}
nav a.active{opacity:1;text-decoration:underline;text-underline-offset:4px}

/* ── PAGE HEADER ── */
.page-header{
  padding:8px 48px 24px;
}
.page-header h1{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:clamp(32px,4vw,56px);
  letter-spacing:-1.5px;
  line-height:1.1;
}

/* ── STEPPER ── */
.stepper-container{
  padding:0 48px 28px;
  display:flex;
  align-items:center;
  overflow-x:auto;
  scrollbar-width:none;
}
.stepper-container::-webkit-scrollbar{display:none}

.step-item{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  transition:opacity 0.3s;
  flex-shrink:0;
}
.step-item.disabled{opacity:0.35;pointer-events:none}
.step-item.completed .step-num{background:var(--green);color:var(--white);border-color:var(--green)}
.step-item.active .step-num{background:var(--brown);color:var(--bg);border-color:var(--brown)}
.step-num{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-heading);font-weight:700;font-size:12px;
  border:2px solid var(--brown-20);
  color:var(--brown-50);
  background:transparent;
  transition:all 0.3s;
  flex-shrink:0;
}
.step-label{
  font-family:var(--font-heading);
  font-weight:500;
  font-size:11px;
  color:var(--brown);
  white-space:nowrap;
  max-width:90px;
  line-height:1.2;
}
.step-item.active .step-label{font-weight:700}
.step-line{
  flex:1;
  height:1.5px;
  background:var(--brown-20);
  margin:0 10px;
  min-width:16px;
  position:relative;
}
.step-line::after{
  content:'';
  position:absolute;
  left:0;top:0;height:100%;
  background:var(--green);
  width:0;
  transition:width 0.5s ease;
}
.step-line.filled::after{width:100%}

/* ── FORM AREA ── */
.form-area{
  flex:1;
  padding:0 48px 24px;
}
.step-panel{display:none;animation:fadeIn 0.3s ease}
.step-panel.visible{display:block}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes quickFill{
  0%  { background:rgba(79,132,72,0.18); }
  100%{ background:transparent; }
}
.quick-filled{
  animation: quickFill 1.2s ease forwards;
  border-bottom-color: var(--green) !important;
}

/* ── FIELD PRIMITIVES ── */
.section-title{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--brown-50);
  margin-bottom:18px;
  padding-bottom:6px;
  border-bottom:1px solid var(--brown-10);
}
.fields-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px 40px;
  margin-bottom:28px;
}
.fields-grid.three-col{grid-template-columns:1fr 1fr 1fr}
.field-full{grid-column:1/-1}

.field-group{position:relative}
.field-group label{
  display:block;
  font-family:var(--font-heading);
  font-weight:700;
  font-size:16px;
  color:var(--brown);
  margin-bottom:4px;
}
.field-group label .req{color:var(--red);font-size:11px;vertical-align:super;margin-left:2px}
.field-group input,.field-group select,.field-group textarea{
  width:100%;
  background:transparent;
  border:none;
  border-bottom:1.5px solid var(--brown-20);
  padding:7px 0;
  font-family:var(--font-body);
  font-style:italic;
  font-weight:300;
  font-size:15px;
  color:var(--brown);
  outline:none;
  transition:border-color 0.25s;
  resize:none;
}
.field-group textarea{min-height:80px;padding:7px 0}
.field-group input::placeholder,.field-group textarea::placeholder{color:var(--brown-50);font-style:italic}
.field-group input:focus,.field-group select:focus,.field-group textarea:focus{border-bottom-color:var(--brown)}
.field-group select{
  -webkit-appearance:none;appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23261D11' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 4px center;
  cursor:pointer;
}
.field-group .field-hint{font-family:var(--font-body);font-size:12px;color:var(--brown-50);margin-top:4px;font-style:italic}
.field-group .field-error{font-family:var(--font-heading);font-size:12px;color:var(--red);margin-top:4px;display:none}
.field-group.has-error input,.field-group.has-error select,.field-group.has-error textarea{border-bottom-color:var(--red)}
.field-group.has-error .field-error{display:block}
.field-group.valid input,.field-group.valid select{border-bottom-color:var(--green)}

/* ── RADIO GROUP ── */
.radio-group{display:flex;align-items:center;gap:20px;padding:7px 0;flex-wrap:wrap}
.radio-option{
  display:flex;align-items:center;gap:7px;cursor:pointer;
  font-family:var(--font-body);font-size:15px;color:var(--brown-50);
}
.radio-option input[type="radio"]{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--brown);cursor:pointer;position:relative;flex-shrink:0;
}
.radio-option input[type="radio"]:checked{background:var(--brown)}
.radio-option input[type="radio"]:checked::after{
  content:'';position:absolute;width:6px;height:6px;background:var(--bg);
  border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
}

/* ── RADIO LIST (forma de ingresso) ── */
.radio-list{display:flex;flex-direction:column;gap:10px}
.radio-list-item{
  display:flex;align-items:flex-start;gap:10px;cursor:pointer;
  font-family:var(--font-body);font-size:14px;color:var(--brown);
  line-height:1.4;
}
.radio-list-item input[type="radio"]{
  -webkit-appearance:none;appearance:none;
  width:17px;height:17px;border-radius:50%;
  border:1.5px solid var(--brown-50);cursor:pointer;
  flex-shrink:0;margin-top:1px;position:relative;transition:all 0.2s;
}
.radio-list-item input[type="radio"]:checked{background:var(--brown);border-color:var(--brown)}
.radio-list-item input[type="radio"]:checked::after{
  content:'';position:absolute;width:5px;height:5px;background:var(--bg);
  border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
}

/* ── CHECKBOX ── */
.check-group{display:flex;flex-direction:column;gap:12px}
.check-item{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  font-family:var(--font-heading);font-size:15px;font-weight:500;color:var(--brown);
}
.check-item input[type="checkbox"]{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;border-radius:4px;
  border:1.5px solid var(--brown);cursor:pointer;
  flex-shrink:0;position:relative;transition:all 0.2s;
}
.check-item input[type="checkbox"]:checked{background:var(--brown);border-color:var(--brown)}
.check-item input[type="checkbox"]:checked::after{
  content:'✓';position:absolute;color:var(--bg);font-size:11px;
  top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-heading);font-weight:700;
}

/* ── DOCS CHECKBOXES ── */
.docs-group{display:flex;gap:20px;padding:7px 0;flex-wrap:wrap}
.doc-item{display:flex;align-items:center;gap:6px;cursor:pointer;font-family:var(--font-heading);font-size:13px;font-weight:500;color:var(--brown-50)}
.doc-item input[type="checkbox"]{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:3px;
  border:1.5px solid var(--brown-20);cursor:pointer;flex-shrink:0;position:relative;transition:all 0.2s;
}
.doc-item input[type="checkbox"]:checked{background:var(--brown);border-color:var(--brown)}
.doc-item input[type="checkbox"]:checked::after{
  content:'✓';position:absolute;color:var(--bg);font-size:9px;
  top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-heading);font-weight:700;
}
.doc-item input[type="checkbox"]:checked ~ span{color:var(--brown)}

/* ── DIAG CARD ── */
.diag-card{
  background:var(--bg-card);border:1px solid var(--brown-10);border-radius:12px;
  padding:20px;margin-bottom:14px;position:relative;
}
.diag-card .remove-btn{
  position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;
  color:var(--red);font-size:16px;font-family:var(--font-heading);font-weight:700;
  opacity:0.6;transition:opacity 0.2s;
}
.diag-card .remove-btn:hover{opacity:1}

.add-btn{
  display:inline-flex;align-items:center;gap:8px;background:none;
  border:1.5px dashed var(--brown-20);border-radius:10px;padding:11px 18px;
  font-family:var(--font-heading);font-weight:500;font-size:13px;color:var(--brown-50);
  cursor:pointer;transition:all 0.2s;margin-top:4px;
}
.add-btn:hover{border-color:var(--brown);color:var(--brown)}

/* ── FAMILY TABLE ── */
/* Reference person row — locked, visually distinct */
.family-table tr.ref-row td{
  background: rgba(79,132,72,0.06);
  font-weight:500;
}
.family-table tr.ref-row:hover td{
  background: rgba(79,132,72,0.09);
}
.badge-ref{
  display:inline-block;
  background:var(--green);
  color:var(--white);
  font-family:var(--font-heading);
  font-weight:700;
  font-size:9px;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 7px;
  border-radius:100px;
  margin-left:8px;
  vertical-align:middle;
  opacity:0.85;
}
/* ── FAMILY TABLE ── */
.family-table-wrap{overflow-x:auto;margin-bottom:20px}
.family-table{
  width:100%;border-collapse:collapse;
  font-family:var(--font-heading);font-size:13px;
}
.family-table th{
  text-align:left;padding:10px 12px;font-weight:700;font-size:11px;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--brown-50);
  border-bottom:1.5px solid var(--brown-20);white-space:nowrap;
}
.family-table td{
  padding:12px 12px;border-bottom:1px solid var(--brown-10);
  color:var(--brown);vertical-align:middle;
}
.family-table tr:last-child td{border-bottom:none}
.family-table tr:hover td{background:rgba(38,29,17,0.02)}
.family-table .td-docs{font-size:11px;color:var(--brown-50)}
.family-table .td-actions{text-align:right;white-space:nowrap}
.btn-icon{
  background:none;border:none;cursor:pointer;
  color:var(--brown-50);font-size:14px;padding:4px 6px;
  border-radius:4px;transition:all 0.2s;
}
.btn-icon:hover{color:var(--red);background:rgba(166,41,13,0.08)}
.btn-icon.edit:hover{color:var(--brown);background:rgba(38,29,17,0.08)}

.empty-state{
  text-align:center;padding:32px 20px;
  font-family:var(--font-body);font-style:italic;color:var(--brown-50);font-size:14px;
  border:1.5px dashed var(--brown-20);border-radius:12px;margin-bottom:20px;
}

/* ── MEMBER MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(38,29,17,0.35);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  background:var(--bg-card);border-radius:16px;width:660px;max-width:95vw;
  max-height:90vh;overflow-y:auto;padding:32px 36px;
  box-shadow:0 24px 80px rgba(38,29,17,0.28);
  transform:translateY(16px);transition:transform 0.3s;
  position:relative;
}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-header h2{font-family:var(--font-heading);font-weight:700;font-size:20px}
.modal-close{
  background:none;border:none;cursor:pointer;color:var(--brown-50);
  font-size:20px;line-height:1;padding:4px;border-radius:4px;transition:all 0.2s;
}
.modal-close:hover{color:var(--red);background:rgba(166,41,13,0.08)}

/* ── ESPECIFICIDADES ── */
.spec-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:0 60px;margin-bottom:28px;
}
.spec-col-title{
  font-family:var(--font-heading);font-weight:700;font-size:12px;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--brown-50);
  margin-bottom:14px;
}
.spec-check-with-field{margin-bottom:16px}
.spec-check-with-field .check-item{margin-bottom:6px}
.spec-sub-field{
  margin-left:28px;
}
.spec-sub-field input{
  width:100%;background:transparent;border:none;
  border-bottom:1.5px solid var(--brown-20);
  padding:5px 0;font-family:var(--font-body);font-style:italic;
  font-weight:300;font-size:14px;color:var(--brown);outline:none;
  transition:border-color 0.25s;
}
.spec-sub-field input::placeholder{color:var(--brown-50);font-style:italic}
.spec-sub-field input:focus{border-bottom-color:var(--brown)}
.spec-sub-field input:disabled{
  opacity:0.3;
  cursor:not-allowed;
  border-bottom-style:dashed;
}
.spec-sub-field input:disabled::placeholder{
  opacity:0.4;
}
/* disabled optional address fields */
.addr-optional input:disabled,
.addr-optional select:disabled{
  opacity:0.25;
  cursor:not-allowed;
  border-bottom-style:dashed;
}
.addr-optional.is-disabled label{
  opacity:0.35;
}
.addr-optional.is-disabled .field-hint{
  opacity:0.25;
}

/* ── INGRESSO LAYOUT ── */
.ingresso-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 60px}
.ingresso-col-title{
  font-family:var(--font-heading);font-weight:700;font-size:12px;
  text-transform:uppercase;letter-spacing:1.5px;color:var(--brown-50);
  margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--brown-10);
}
.ingresso-section{margin-bottom:28px}
.ingresso-bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 60px;margin-top:28px;padding-top:24px;border-top:1px solid var(--brown-10)}

/* ── BUTTON BAR ── */
.button-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 48px 36px;margin-top:auto;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:13px 28px;
  border-radius:100px;font-family:var(--font-body);font-weight:500;
  font-style:italic;font-size:15px;letter-spacing:0.5px;
  cursor:pointer;border:none;transition:all 0.25s;
}
.btn-primary{background:var(--green);color:var(--bg);box-shadow:2px 2px 8px rgba(0,0,0,0.12)}
.btn-primary:hover{background:var(--green-light);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--brown);border:1.5px solid var(--brown-20)}
.btn-secondary:hover{border-color:var(--brown)}
.btn-danger{background:var(--red);color:var(--bg);box-shadow:2px 2px 8px rgba(0,0,0,0.12)}
.btn-danger:hover{background:var(--red-light)}
.btn:disabled{opacity:0.4;pointer-events:none}
.btn svg{width:17px;height:17px}

.legend{font-family:var(--font-heading);font-size:12px;color:var(--brown-50);margin-bottom:20px}
.legend .req{color:var(--red);font-weight:700}

/* ── CID CALLOUT ── */
.cid-callout{
  display:flex;
  align-items:flex-start;
  gap:16px;
  background:rgba(79,132,72,0.07);
  border:1.5px solid rgba(79,132,72,0.25);
  border-radius:12px;
  padding:16px 20px;
  margin-bottom:24px;
}
.cid-callout-icon{
  font-size:20px;
  line-height:1;
  flex-shrink:0;
  margin-top:1px;
}
.cid-callout-body{
  flex:1;
  min-width:0;
}
.cid-callout-title{
  font-family:var(--font-heading);
  font-weight:700;
  font-size:13px;
  color:var(--green);
  margin-bottom:4px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.cid-callout-text{
  font-family:var(--font-body);
  font-size:13px;
  font-style:italic;
  color:var(--brown);
  line-height:1.5;
  margin-bottom:10px;
}
.cid-callout-text strong{
  font-style:normal;
  font-family:var(--font-heading);
  font-weight:700;
  color:var(--brown);
  background:rgba(79,132,72,0.12);
  padding:1px 6px;
  border-radius:4px;
  font-size:12px;
  letter-spacing:0.5px;
}
.cid-chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.cid-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--bg-card);
  border:1.5px solid var(--brown-20);
  border-radius:8px;
  padding:5px 12px;
  font-family:var(--font-heading);
  font-size:12px;
  font-weight:500;
  color:var(--brown);
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}
.cid-chip:hover{
  border-color:var(--green);
  color:var(--green);
  background:rgba(79,132,72,0.06);
  transform:translateY(-1px);
}
.cid-chip-code{
  font-weight:700;
  color:var(--green);
  font-size:11px;
}
.cid-chip:hover .cid-chip-code{
  color:var(--green);
}
/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--green);color:var(--white);
  font-family:var(--font-heading);font-weight:500;font-size:14px;
  padding:12px 28px;border-radius:100px;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  transition:transform 0.4s ease;z-index:100;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  nav,.page-header,.form-area,.button-bar{padding-left:20px;padding-right:20px}
  .stepper-container{padding-left:20px;padding-right:20px}
  .fields-grid,.fields-grid.three-col{grid-template-columns:1fr}
  .spec-grid,.ingresso-grid,.ingresso-bottom-grid{grid-template-columns:1fr}
  .page-header h1{font-size:28px}
  .step-label{display:none}
  .modal-box{padding:24px 20px}
}
</style>
</head>
<body>

<nav>
  <div class="menu-icon"><span></span><span></span><span></span></div>
  <a href="#">Famílias</a>
  <a href="#" class="active">Cadastro</a>
</nav>

<div class="page-header">
  <h1 id="pageTitle">Pessoa de Referência</h1>
</div>

<div class="stepper-container" id="stepper"></div>

<div class="form-area" id="formArea"></div>

<div class="button-bar">
  <button class="btn btn-secondary" id="btnBack" onclick="goBack()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar
  </button>
  <button class="btn btn-primary" id="btnNext" onclick="goNext()">
    Próximo
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

<!-- ── MODAL MEMBRO ── -->
<div class="modal-overlay" id="memberModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">Adicionar Membro</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>

    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="fields-grid">
      <div class="field-group field-full">
        <label>Nome completo <span class="req">*</span></label>

        <label>Data de nascimento <span class="req">*</span></label>
        <input type="date" id="m_birthDate">

        <label>Parentesco <span class="req">*</span></label>

          <option value="" disabled selected>Selecione</option>
          <option value="02">02 - Cônjuge / companheiro(a)</option>
          <option value="03">03 - Filho(a)</option>
          <option value="04">04 - Enteado(a)</option>
          <option value="05">05 - Neto(a) / Bisneto(a)</option>
          <option value="06">06 - Pai / Mãe</option>
          <option value="07">07 - Sogro(a)</option>
          <option value="08">08 - Irmão / Irmã</option>
          <option value="09">09 - Genro / Nora</option>
          <option value="10">10 - Outro parente</option>
          <option value="11">11 - Não parente</option>
        </select>
      </div>
      <div class="field-group">
        <label>Sexo <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="m_sex" value="masculino"> Masculino</label>
          <label class="radio-option"><input type="radio" name="m_sex" value="feminino"> Feminino</label>
          <label class="radio-option"><input type="radio" name="m_sex" value="outro"> Outro</label>
        </div>
      </div>
      <div class="field-group">
        <label>Pessoa com deficiência? <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="m_pcd" value="sim"> Sim</label>
          <label class="radio-option"><input type="radio" name="m_pcd" value="nao"> Não</label>
        </div>
      </div>
      <div class="field-group">
        <label>Documentos necessários</label>
        <div class="docs-group">
          <label class="doc-item"><input type="checkbox" id="m_doc_cn" value="CN"><span>CN</span></label>
          <label class="doc-item"><input type="checkbox" id="m_doc_rg" value="RG"><span>RG</span></label>
          <label class="doc-item"><input type="checkbox" id="m_doc_ctps" value="CTPS"><span>CTPS</span></label>
          <label class="doc-item"><input type="checkbox" id="m_doc_cpf" value="CPF"><span>CPF</span></label>
          <label class="doc-item"><input type="checkbox" id="m_doc_te" value="TE"><span>TE</span></label>
          <label class="doc-item"><input type="checkbox" id="m_doc_cns" value="CNS"><span>CNS</span></label>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:8px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveMember()">Salvar membro</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
const STEPS = [
  {id:0, label:'Dados pessoais'},
  {id:1, label:'Documentos'},
  {id:2, label:'Endereço'},
  {id:3, label:'Diagnósticos'},
  {id:4, label:'Composição Familiar'},
  {id:5, label:'Especificidades'},
  {id:6, label:'Forma de Ingresso'},
];

const PAGE_TITLES = [
  'Dados Pessoais',
  'Documentos & Nascimento',
  'Endereço',
  'Diagnósticos',
  'Composição Familiar',
  'Especificidades',
  'Forma de Ingresso',
];

const UFS = ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO'];
const PARENTESCO_MAP = {
  '02':'02 - Cônjuge / companheiro(a)','03':'03 - Filho(a)','04':'04 - Enteado(a)',
  '05':'05 - Neto(a) / Bisneto(a)','06':'06 - Pai / Mãe','07':'07 - Sogro(a)',
  '08':'08 - Irmão / Irmã','09':'09 - Genro / Nora','10':'10 - Outro parente','11':'11 - Não parente',
};

let current = 0;
let diagCount = 1;
let formData = {};
let familyMembers = [];
let editingMemberIdx = -1;

/* ─────────────────────────────────────────
   STEPPER
───────────────────────────────────────── */
function buildStepper(){
  const c = document.getElementById('stepper');
  c.innerHTML = '';
  STEPS.forEach((s,i)=>{
    const item = document.createElement('div');
    item.className = 'step-item' + (i===current?' active':'') + (i<current?' completed':'') + (i>current?' disabled':'');
    item.onclick = ()=>{ if(i<=current) goTo(i); };
    const check = i<current
      ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>'
      : (i+1);
    item.innerHTML = `<div class="step-num">${check}</div><span class="step-label">${s.label}</span>`;
    c.appendChild(item);
    if(i < STEPS.length-1){
      const line = document.createElement('div');
      line.className = 'step-line' + (i<current?' filled':'');
      c.appendChild(line);
    }
  });
  document.getElementById('pageTitle').textContent = PAGE_TITLES[current];
}

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
function fd(k){ return formData[k] || ''; }
function save(el){ formData[el.dataset.field] = el.value; }

function maskCPF(el){
  let v = el.value.replace(/\D/g,'');
  if(v.length>3) v=v.slice(0,3)+'.'+v.slice(3);
  if(v.length>7) v=v.slice(0,7)+'.'+v.slice(7);
  if(v.length>11) v=v.slice(0,11)+'-'+v.slice(11);
  el.value = v.slice(0,14);
}
function maskCEP(el){
  let v = el.value.replace(/\D/g,'');
  if(v.length>5) v=v.slice(0,5)+'-'+v.slice(5);
  el.value = v.slice(0,9);
}
function maskPhone(el){
  let v = el.value.replace(/\D/g,'');
  if(v.length>0) v='('+v;
  if(v.length>3) v=v.slice(0,3)+') '+v.slice(3);
  if(v.length>10) v=v.slice(0,10)+'-'+v.slice(10);
  el.value = v.slice(0,15);
}

function selectOpt(name, val){
  formData[name] = val;
  document.querySelectorAll(`[data-radio="${name}"]`).forEach(el=>{
    el.querySelector('input').checked = el.dataset.val===val;
  });
}

function toggleAddressFields(val){
  const isRua = val === 'situacao_rua';
  const ids = ['addr_cep','addr_street','addr_number','addr_complement','addr_neighborhood'];
  ids.forEach(id => {
    const wrap = document.getElementById(id);
    if(!wrap) return;
    const input = wrap.querySelector('input, select');
    if(isRua){
      wrap.classList.add('is-disabled');
      if(input){
        input.disabled = true;
        // Clear value + formData so it doesn't leak into payload
        input.value = '';
        if(input.dataset.field) delete formData[input.dataset.field];
      }
    } else {
      wrap.classList.remove('is-disabled');
      if(input) input.disabled = false;
    }
  });
  // Show/hide the warning hint
  const hint = document.querySelector('[data-shelter-hint]');
  if(hint) hint.style.display = isRua ? 'block' : 'none';
}

function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

/* ─────────────────────────────────────────
   STEP BUILDERS
───────────────────────────────────────── */
function buildStep0(){
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="section-title">Identificação</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Nome <span class="req">*</span></label>
        <input type="text" placeholder="Primeiro nome" data-field="firstName" oninput="save(this)" value="${fd('firstName')}">
      </div>
      <div class="field-group">
        <label>Sobrenome <span class="req">*</span></label>
        <input type="text" placeholder="Sobrenome completo" data-field="lastName" oninput="save(this)" value="${fd('lastName')}">
      </div>
      <div class="field-group">
        <label>Nome social</label>
        <input type="text" placeholder="Se possuir" data-field="socialName" oninput="save(this)" value="${fd('socialName')}">
        <span class="field-hint">Preencha apenas se diferente do nome civil</span>
      </div>
      <div class="field-group">
        <label>Nome da mãe <span class="req">*</span></label>
        <input type="text" placeholder="Nome completo da mãe" data-field="motherName" oninput="save(this)" value="${fd('motherName')}">
      </div>
    </div>
    <div class="section-title">Informações adicionais</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Nacionalidade <span class="req">*</span></label>
        <select data-field="nationality" onchange="save(this)">
          <option value="" disabled ${!fd('nationality')?'selected':''}>Selecione</option>
          <option value="brasileiro" ${fd('nationality')==='brasileiro'?'selected':''}>Brasileiro(a)</option>
          <option value="estrangeiro" ${fd('nationality')==='estrangeiro'?'selected':''}>Estrangeiro(a)</option>
          <option value="naturalizado" ${fd('nationality')==='naturalizado'?'selected':''}>Naturalizado(a)</option>
        </select>
      </div>
      <div class="field-group">
        <label>Sexo <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option" data-radio="sex" data-val="masculino" onclick="selectOpt('sex','masculino')">
            <input type="radio" name="sex" ${fd('sex')==='masculino'?'checked':''}> Masculino
          </label>
          <label class="radio-option" data-radio="sex" data-val="feminino" onclick="selectOpt('sex','feminino')">
            <input type="radio" name="sex" ${fd('sex')==='feminino'?'checked':''}> Feminino
          </label>
          <label class="radio-option" data-radio="sex" data-val="outro" onclick="selectOpt('sex','outro')">
            <input type="radio" name="sex" ${fd('sex')==='outro'?'checked':''}> Outro
          </label>
        </div>
      </div>
      <div class="field-group">
        <label>Telefone</label>
        <input type="text" placeholder="(00) 00000-0000" data-field="phone" oninput="maskPhone(this);save(this)" value="${fd('phone')}" maxlength="15">
      </div>
    </div>
  `;
}

function buildStep1(){
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="section-title">Documentos civis</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>CPF</label>
        <input type="text" placeholder="000.000.000-00" data-field="cpf" oninput="maskCPF(this);save(this)" value="${fd('cpf')}" maxlength="14">
      </div>
      <div class="field-group">
        <label>NIS</label>
        <input type="text" placeholder="00000000000" data-field="nis" oninput="save(this)" value="${fd('nis')}" maxlength="11">
      </div>
      <div class="field-group">
        <label>CNS <span class="field-hint" style="font-style:normal;font-size:11px;opacity:0.7">Cartão Nacional de Saúde</span></label>
        <input type="text" placeholder="000 0000 0000 0000" data-field="cns" oninput="save(this)" value="${fd('cns')}">
      </div>
    </div>
    <div class="section-title">Registro Geral (RG)</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Número do RG</label>
        <input type="text" placeholder="Número do documento" data-field="rgNumber" oninput="save(this)" value="${fd('rgNumber')}">
      </div>
      <div class="field-group">
        <label>UF do RG</label>
        <select data-field="rgState" onchange="save(this)">
          <option value="" disabled ${!fd('rgState')?'selected':''}>Selecione</option>
          ${UFS.map(u=>`<option value="${u}" ${fd('rgState')===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <label>Órgão emissor</label>
        <input type="text" placeholder="Ex: SSP, DETRAN" data-field="rgAgency" oninput="save(this)" value="${fd('rgAgency')}">
      </div>
      <div class="field-group">
        <label>Data de emissão</label>
        <input type="date" data-field="rgIssueDate" onchange="save(this)" value="${fd('rgIssueDate')}">
      </div>
    </div>
    <div class="section-title">Nascimento</div>
    <div class="fields-grid">
      <div class="field-group">
        <label>Data de nascimento <span class="req">*</span></label>
        <input type="date" data-field="birthDate" onchange="save(this)" value="${fd('birthDate')}">
      </div>
    </div>
  `;
}

function buildStep2(){
  const isRua = fd('isShelter') === 'situacao_rua';
  const dis   = isRua ? 'disabled' : '';
  const dc    = isRua ? 'addr-optional is-disabled' : 'addr-optional';
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório</p>
    <div class="section-title">Tipo de moradia</div>
    <div class="fields-grid">
      <div class="field-group field-full">
        <label>Situação do domicílio <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option" data-radio="isShelter" data-val="sim"
            onclick="selectOpt('isShelter','sim'); toggleAddressFields('sim')">
            <input type="radio" name="isShelter" ${fd('isShelter')==='sim'?'checked':''}> Sim — Abrigo
          </label>
          <label class="radio-option" data-radio="isShelter" data-val="nao"
            onclick="selectOpt('isShelter','nao'); toggleAddressFields('nao')">
            <input type="radio" name="isShelter" ${fd('isShelter')==='nao'?'checked':''}> Não
          </label>
          <label class="radio-option" data-radio="isShelter" data-val="situacao_rua"
            onclick="selectOpt('isShelter','situacao_rua'); toggleAddressFields('situacao_rua')">
            <input type="radio" name="isShelter" ${fd('isShelter')==='situacao_rua'?'checked':''}> Família / pessoa em situação de rua
          </label>
        </div>
        ${isRua ? `<span class="field-hint" style="color:var(--red);opacity:0.7;margin-top:6px;display:block">
          ⚠ Campos de endereço desabilitados — não aplicável para situação de rua.
        </span>` : ''}
      </div>
      <div class="field-group">
        <label>Localização do domicílio <span class="req">*</span></label>
        <div class="radio-group">
          <label class="radio-option" data-radio="residenceLocation" data-val="urbano" onclick="selectOpt('residenceLocation','urbano')">
            <input type="radio" name="residenceLocation" ${fd('residenceLocation')==='urbano'?'checked':''}> Urbano
          </label>
          <label class="radio-option" data-radio="residenceLocation" data-val="rural" onclick="selectOpt('residenceLocation','rural')">
            <input type="radio" name="residenceLocation" ${fd('residenceLocation')==='rural'?'checked':''}> Rural
          </label>
        </div>
      </div>
    </div>
    <div class="section-title">Endereço</div>
    <div class="fields-grid">
      <div class="${dc}" id="addr_cep">
        <label>CEP</label>
        <input type="text" placeholder="00000-000" data-field="cep" oninput="maskCEP(this);save(this)" value="${fd('cep')}" maxlength="9" ${dis}>
        <span class="field-hint">Preencha o CEP para autocompletar</span>
      </div>
      <div class="${dc}" id="addr_street">
        <label>Logradouro</label>
        <input type="text" placeholder="Rua, Avenida..." data-field="street" oninput="save(this)" value="${fd('street')}" ${dis}>
      </div>
      <div class="${dc}" id="addr_number">
        <label>Número</label>
        <input type="text" placeholder="Nº" data-field="number" oninput="save(this)" value="${fd('number')}" ${dis}>
      </div>
      <div class="${dc}" id="addr_complement">
        <label>Complemento</label>
        <input type="text" placeholder="Apto, bloco..." data-field="complement" oninput="save(this)" value="${fd('complement')}" ${dis}>
      </div>
      <div class="${dc}" id="addr_neighborhood">
        <label>Bairro</label>
        <input type="text" placeholder="Nome do bairro" data-field="neighborhood" oninput="save(this)" value="${fd('neighborhood')}" ${dis}>
      </div>
      <div class="field-group">
        <label>UF <span class="req">*</span></label>
        <select data-field="state" onchange="save(this)">
          <option value="" disabled ${!fd('state')?'selected':''}>Selecione</option>
          ${UFS.map(u=>`<option value="${u}" ${fd('state')===u?'selected':''}>${u}</option>`).join('')}
        </select>
      </div>
      <div class="field-group">
        <label>Cidade <span class="req">*</span></label>
        <input type="text" placeholder="Nome da cidade" data-field="city" oninput="save(this)" value="${fd('city')}">
      </div>
    </div>
  `;
}

function buildDiagCard(i){
  return `
    <div class="diag-card" id="diag-${i}">
      ${i>0?`<button class="remove-btn" onclick="removeDiag(${i})">✕</button>`:''}
      <div class="fields-grid">
        <div class="field-group">
          <label>Código CID <span class="req">*</span></label>
          <input type="text" placeholder="Ex: Q87.1" data-field="diag_icd_${i}" oninput="save(this)" value="${fd('diag_icd_'+i)}">
          <span class="field-hint">Classificação Internacional de Doenças</span>
        </div>
        <div class="field-group">
          <label>Data do diagnóstico <span class="req">*</span></label>
          <input type="date" data-field="diag_date_${i}" onchange="save(this)" value="${fd('diag_date_'+i)}">
        </div>
        <div class="field-group field-full">
          <label>Descrição <span class="req">*</span></label>
          <input type="text" placeholder="Descrição do diagnóstico" data-field="diag_desc_${i}" oninput="save(this)" value="${fd('diag_desc_'+i)}">
        </div>
      </div>
    </div>
  `;
}

function buildStep3(){
  let cards = '';
  for(let i=0;i<diagCount;i++) cards += buildDiagCard(i);
  return `
    <p class="legend"><span class="req">*</span> Campo obrigatório — Pelo menos 1 diagnóstico é necessário</p>

    <div class="cid-callout">
      <div class="cid-callout-icon">💡</div>
      <div class="cid-callout-body">
        <div class="cid-callout-title">CIDs úteis para este cadastro</div>
        <p class="cid-callout-text">
          Diagnóstico ainda não fechado ou em investigação? Use
          <strong>Z03.9</strong> — padrão do sistema para casos sob observação.
          Clique em qualquer chip abaixo para preencher o primeiro diagnóstico automaticamente.
        </p>
        <div class="cid-chips">
          <button class="cid-chip" onclick="applyQuickCid(0, 'Z03.9', 'Observação por suspeita de doença ou afecção não especificada')">
            <span class="cid-chip-code">Z03.9</span>
            <span>Em investigação</span>
          </button>
        </div>
      </div>
    </div>

    <div class="section-title">Diagnósticos iniciais</div>
    <div id="diagContainer">${cards}</div>
    <button class="add-btn" onclick="addDiag()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Adicionar diagnóstico
    </button>
  `;
}

/* ── STEP 4 — Composição Familiar ── */
function calcAge(birthDate){
  if(!birthDate) return '–';
  const diff = Date.now() - new Date(birthDate).getTime();
  return Math.floor(diff / (365.25*24*60*60*1000)) + ' anos';
}

function buildRefPersonRow(){
  // Build the reference person row from formData (steps 0-1)
  const firstName = formData.firstName || '';
  const lastName  = formData.lastName  || '';
  const fullName  = [firstName, lastName].filter(Boolean).join(' ') || '—';
  const sex       = formData.sex || '';
  const birthDate = formData.birthDate || '';
  const sexLabel  = sex === 'masculino' ? 'Masculino' : sex === 'feminino' ? 'Feminino' : sex === 'outro' ? 'Outro' : '–';
  const age       = birthDate ? calcAge(birthDate) : '–';
  return `
    <tr class="ref-row">
      <td>${fullName}<span class="badge-ref">Referência</span></td>
      <td>${age}</td>
      <td>${sexLabel}</td>
      <td>01 - Pessoa de Referência</td>
      <td>–</td>
      <td class="td-docs">–</td>
      <td class="td-actions" title="Não é possível remover a pessoa de referência">
        <span style="font-size:12px;color:var(--brown-20);padding:0 6px;">🔒</span>
      </td>
    </tr>
  `;
}

function buildFamilyTable(){
  const refRow  = buildRefPersonRow();
  const otherRows = familyMembers.map((m,i)=>{
    const docs = m.docs.length ? m.docs.join(', ') : '–';
    return `
      <tr>
        <td>${m.name}</td>
        <td>${calcAge(m.birthDate)}</td>
        <td>${m.sex === 'masculino' ? 'Masculino' : m.sex === 'feminino' ? 'Feminino' : 'Outro'}</td>
        <td>${PARENTESCO_MAP[m.relationship] || '–'}</td>
        <td>${m.pcd === 'sim' ? 'Sim' : 'Não'}</td>
        <td class="td-docs">${docs}</td>
        <td class="td-actions">
          <button class="btn-icon edit" onclick="editMember(${i})" title="Editar">✎</button>
          <button class="btn-icon" onclick="deleteMember(${i})" title="Remover">✕</button>
        </td>
      </tr>
    `;
  }).join('');

  // Always show the table — ref person guarantees at least 1 row
  return `
    <div class="family-table-wrap">
      <table class="family-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Sexo</th>
            <th>Parentesco</th>
            <th>PcD</th>
            <th>Documentos</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${refRow}
          ${otherRows}
        </tbody>
      </table>
    </div>
    ${!familyMembers.length ? `<p style="font-family:var(--font-body);font-style:italic;font-size:13px;color:var(--brown-50);margin-top:4px;">Adicione outros membros da família abaixo, se houver.</p>` : ''}
  `;
}

function buildStep4(){
  return `
    <div class="section-title">Membros da família</div>
    <div id="familyTableArea">${buildFamilyTable()}</div>
    <button class="add-btn" onclick="openModal(-1)">

    </button>
  `;
}

            <input type="checkbox"

/* ── STEP 6 — Forma de Ingresso ── */

  function chk(key){ return progs[key] ? 'checked' : ''; }

    {v:'espontaneo', l:'Por demanda espontânea'},
    {v:'busca_ativa', l:'Em decorrência de busca ativa realizada pela equipe da unidade'},

    {v:'enc_judiciario', l:'Em decorrência de encaminhamento realizado pelo Poder Judiciário'},
    {v:'enc_conselho', l:'Em decorrência de encaminhamento realizado pelo Conselho Tutelar'},
    {v:'enc_educacao', l:'Em decorrência de encaminhamento realizado pela área de educação'},
    {v:'enc_setoriais', l:'Em decorrência de encaminhamento realizado por outras políticas setoriais'},
    {v:'enc_psb', l:'Em decorrência de encaminhamento realizado por outros serviços/unidade da Proteção Social Básica'},
    {v:'enc_pse', l:'Em decorrência de encaminhamento realizado por outros serviços/unidades da Proteção Social Especial'},

      <div class="field-group">

/* ─────────────────────────────────────────
   SPEC / INGRESSO / PROG SAVERS
───────────────────────────────────────── */
function saveSpec(key, val){
  if(!formData.specs) formData.specs = {};
  formData.specs[key] = val;
  // Clear stored text when unchecking
  if(!val) delete formData['spec_detail_' + key];
}

function toggleSpecField(inputId, enabled){
  const el = document.getElementById(inputId);
  if(!el) return;
  el.disabled = !enabled;
  if(!enabled){
    el.value = '';
    // Also clear from formData
    delete formData[el.dataset.field];
  } else {
    el.focus();
  }
}
function saveIngresso(val){
  formData.ingressoType = val;
}
function saveProg(key, val){
  if(!formData.programas) formData.programas = {};
  formData.programas[key] = val;
  if(key==='outros') render(); // re-render to show/hide text field
}

/* ─────────────────────────────────────────
   DIAG ACTIONS
───────────────────────────────────────── */
function addDiag(){
  diagCount++;
  document.getElementById('diagContainer').insertAdjacentHTML('beforeend', buildDiagCard(diagCount-1));
}

function applyQuickCid(cardIndex, icdCode, description){
  // If the target card doesn't exist yet, create it
  if(cardIndex >= diagCount){
    addDiag();
    cardIndex = diagCount - 1;
  }
  // Fill formData
  formData['diag_icd_' + cardIndex] = icdCode;
  formData['diag_desc_' + cardIndex] = description;
  // Fill DOM inputs in the card
  const card = document.getElementById('diag-' + cardIndex);
  if(card){
    const icdInput  = card.querySelector('[data-field="diag_icd_'  + cardIndex + '"]');
    const descInput = card.querySelector('[data-field="diag_desc_' + cardIndex + '"]');
    if(icdInput){
      icdInput.value = icdCode;
      icdInput.classList.add('quick-filled');
      setTimeout(()=>icdInput.classList.remove('quick-filled'), 1200);
    }
    if(descInput){
      descInput.value = description;
      descInput.classList.add('quick-filled');
      setTimeout(()=>descInput.classList.remove('quick-filled'), 1200);
    }
  }
  showToast('CID ' + icdCode + ' aplicado!');
}
function removeDiag(i){
  const el = document.getElementById('diag-'+i);
  if(el){
    el.remove();
    ['icd','date','desc'].forEach(k=>delete formData['diag_'+k+'_'+i]);
  }
}

/* ─────────────────────────────────────────
   MEMBER MODAL
───────────────────────────────────────── */
function openModal(idx){
  editingMemberIdx = idx;
  const modal = document.getElementById('memberModal');
  const title = document.getElementById('modalTitle');

  // Reset
  document.getElementById('m_name').value = '';
  document.getElementById('m_birthDate').value = '';
  document.getElementById('m_relationship').value = '';
  document.querySelectorAll('[name="m_sex"]').forEach(r=>r.checked=false);
  document.querySelectorAll('[name="m_pcd"]').forEach(r=>r.checked=false);
  ['cn','rg','ctps','cpf','te'].forEach(d=>{ document.getElementById('m_doc_'+d).checked=false; });

  if(idx >= 0){
    title.textContent = 'Editar Membro';
    const m = familyMembers[idx];
    document.getElementById('m_name').value = m.name;
    document.getElementById('m_birthDate').value = m.birthDate;
    document.getElementById('m_relationship').value = m.relationship;
    document.querySelectorAll('[name="m_sex"]').forEach(r=>{ if(r.value===m.sex) r.checked=true; });
    document.querySelectorAll('[name="m_pcd"]').forEach(r=>{ if(r.value===m.pcd) r.checked=true; });
    m.docs.forEach(d=>{ const el=document.getElementById('m_doc_'+d.toLowerCase()); if(el) el.checked=true; });
  } else {
    title.textContent = 'Adicionar Membro';
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('memberModal').classList.remove('open');
  document.body.style.overflow = '';
}

function saveMember(){
  const name = document.getElementById('m_name').value.trim();
  const birthDate = document.getElementById('m_birthDate').value;
  const relationship = document.getElementById('m_relationship').value;
  const sexEl = document.querySelector('[name="m_sex"]:checked');
  const pcdEl = document.querySelector('[name="m_pcd"]:checked');

  if(!name || !birthDate || !relationship || !sexEl || !pcdEl){
    showToast('Preencha todos os campos obrigatórios', true);
    return;
  }

  const docs = [];
  ['CN','RG','CTPS','CPF','TE','CNS'].forEach(d=>{
    const el = document.getElementById('m_doc_'+d.toLowerCase());
    if(el && el.checked) docs.push(d);
  });

  const member = { name, birthDate, relationship, sex: sexEl.value, pcd: pcdEl.value, docs };

  if(editingMemberIdx >= 0){
    familyMembers[editingMemberIdx] = member;
  } else {
    familyMembers.push(member);
  }

  closeModal();
  document.getElementById('familyTableArea').innerHTML = buildFamilyTable();
}

function editMember(idx){
  openModal(idx);
}

function deleteMember(idx){
  familyMembers.splice(idx, 1);
  document.getElementById('familyTableArea').innerHTML = buildFamilyTable();
}

/* ─────────────────────────────────────────
   RENDER / NAVIGATION
───────────────────────────────────────── */
function render(){
  buildStepper();
  const area = document.getElementById('formArea');
  const builders = [buildStep0, buildStep1, buildStep2, buildStep3, buildStep4, buildStep5, buildStep6];
  area.innerHTML = `<div class="step-panel visible">${builders[current]()}</div>`;

  const back = document.getElementById('btnBack');
  const next = document.getElementById('btnNext');
  back.style.visibility = current === 0 ? 'hidden' : 'visible';

  if(current === STEPS.length - 1){
    next.innerHTML = 'Salvar cadastro <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M5 13l4 4L19 7"/></svg>';
  } else {
    next.innerHTML = 'Próximo <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }
}

function goTo(step){ current = step; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function goBack(){ if(current>0){ current--; render(); window.scrollTo({top:0,behavior:'smooth'}); } }
function goNext(){
  if(current < STEPS.length-1){
    current++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    showToast('Cadastro salvo com sucesso!');
    // buildPayload();
  }
}

/* ─────────────────────────────────────────
   PAYLOAD BUILDER
───────────────────────────────────────── */

/* ── INIT ── */
render();
</script>

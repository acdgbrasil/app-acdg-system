name: Conecta Web — Build and Publish

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'apps/acdg_system/**'
      - 'packages/**'
      - 'bff/shared/**'
      - 'Dockerfile.web'
  push:
    branches: [main]
    paths:
      - 'apps/acdg_system/**'
      - 'packages/**'
      - 'bff/shared/**'
      - 'Dockerfile.web'
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: acdgbrasil/conecta-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Fetch secrets from Bitwarden
        if: github.event_name != 'pull_request'
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.ACDG_ORG_BW_SM_ACCESS_TOKEN_PROD }}
          secrets: |
            e384ef43-978c-4f04-b50e-b42201380a4c > OIDC_ISSUER
            29ebaaa5-bcad-4db9-90f4-b4220138173b > OIDC_CLIENT_ID
            89f73bc5-6dff-42c1-9c01-b4250086a6bf > SENTRY_DSN

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.web
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OIDC_ISSUER=${{ env.OIDC_ISSUER || 'http://localhost:8080' }}
            OIDC_CLIENT_ID=${{ env.OIDC_CLIENT_ID || 'dummy-client-id' }}
            BFF_BASE_URL=/api
            SENTRY_DSN=${{ env.SENTRY_DSN || '' }}
            APP_ENV=production
            SENTRY_RELEASE=conecta-raros@${{ github.sha }}
            SENTRY_DIST=web

name: Windows MSIX Build & Release

on:
  push:
    tags:
      - 'v*' # Trigger build on any tag starting with v (e.g., v0.1.0)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.4' # Usando a versão do flutter do seu ambiente
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Cache Flutter and Dart dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
            ${{ github.workspace }}/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Fetch secrets from Bitwarden
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.ACDG_ORG_BW_SM_ACCESS_TOKEN_PROD }}
          secrets: |
            e384ef43-978c-4f04-b50e-b42201380a4c > OIDC_ISSUER
            29ebaaa5-bcad-4db9-90f4-b4220138173b > OIDC_CLIENT_ID
            89f73bc5-6dff-42c1-9c01-b4250086a6bf > SENTRY_DSN

      - name: Create .env file
        working-directory: apps/acdg_system
        run: |
          echo "OIDC_ISSUER=${{ env.OIDC_ISSUER }}" > .env
          echo "OIDC_CLIENT_ID=${{ env.OIDC_CLIENT_ID }}" >> .env
          echo "OIDC_SCOPES=openid profile email offline_access urn:zitadel:iam:org:project:roles" >> .env
          echo "CUSTOM_SCHEME=com.acdg.system" >> .env
          echo "BFF_BASE_URL=https://bff.acdgbrasil.com.br" >> .env
          echo "SENTRY_DSN=${{ env.SENTRY_DSN }}" >> .env
          echo "APP_ENV=production" >> .env

      - name: Install dependencies
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Run code generation
        run: melos run build_runner

      - name: Build Windows App
        run: flutter build windows --release --dart-define-from-file=.env
        working-directory: apps/acdg_system

      - name: Create MSIX Installer
        run: dart run msix:create
        working-directory: apps/acdg_system

      - name: Release to GitHub
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: apps/acdg_system/build/windows/x64/runner/Release/*.msix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

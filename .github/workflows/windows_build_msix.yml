name: Windows MSIX Build, Validate & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_wack:
        description: 'Skip Windows App Certification Kit validation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    name: Build MSIX
    runs-on: windows-latest
    permissions:
      contents: write

    outputs:
      msix_path: ${{ steps.find_msix.outputs.path }}
      msix_name: ${{ steps.find_msix.outputs.name }}
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v0.0.0-dev"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${TAG}"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Cache Flutter and Dart dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
            ${{ github.workspace }}/build
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Fetch secrets from Bitwarden
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.ACDG_ORG_BW_SM_ACCESS_TOKEN_PROD }}
          secrets: |
            e384ef43-978c-4f04-b50e-b42201380a4c > OIDC_ISSUER
            29ebaaa5-bcad-4db9-90f4-b4220138173b > OIDC_CLIENT_ID
            89f73bc5-6dff-42c1-9c01-b4250086a6bf > SENTRY_DSN

      - name: Create .env file
        working-directory: apps/acdg_system
        run: |
          echo "OIDC_ISSUER=${{ env.OIDC_ISSUER }}" > .env
          echo "OIDC_CLIENT_ID=${{ env.OIDC_CLIENT_ID }}" >> .env
          echo "OIDC_SCOPES=openid profile email offline_access urn:zitadel:iam:org:project:roles" >> .env
          echo "CUSTOM_SCHEME=com.acdg.system" >> .env
          echo "BFF_BASE_URL=https://bff.acdgbrasil.com.br" >> .env
          echo "SENTRY_DSN=${{ env.SENTRY_DSN }}" >> .env
          echo "APP_ENV=production" >> .env

      - name: Install dependencies
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Run code generation
        run: melos run build_runner

      - name: Build Windows App
        run: flutter build windows --release --dart-define-from-file=.env
        working-directory: apps/acdg_system

      - name: Create MSIX Installer
        run: dart run msix:create
        working-directory: apps/acdg_system

      - name: Find MSIX artifact
        id: find_msix
        shell: bash
        run: |
          msix_file=$(find apps/acdg_system/build -name "*.msix" -type f | head -1)
          if [[ -z "$msix_file" ]]; then
            echo "::error::No MSIX file found after build"
            exit 1
          fi
          echo "path=${msix_file}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename ${msix_file})" >> "$GITHUB_OUTPUT"
          echo "Found MSIX: ${msix_file}"

      - name: Upload MSIX as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: msix-installer
          path: ${{ steps.find_msix.outputs.path }}
          retention-days: 30

  validate:
    name: WACK Validation
    needs: build
    runs-on: windows-latest
    if: ${{ github.event.inputs.skip_wack != 'true' }}

    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: msix-installer
          path: msix

      - name: Run Windows App Certification Kit
        shell: powershell
        run: |
          $msix = Get-ChildItem -Path msix -Filter *.msix -Recurse | Select-Object -First 1
          if (-not $msix) {
            Write-Error "No MSIX file found"
            exit 1
          }

          Write-Host "Validating: $($msix.FullName)"

          # WACK path (Windows SDK)
          $wackPath = "C:\Program Files (x86)\Windows Kits\10\App Certification Kit\appcert.exe"

          if (-not (Test-Path $wackPath)) {
            Write-Warning "WACK not found at expected path. Skipping validation."
            Write-Host "##[warning]Windows App Certification Kit not available on this runner."
            exit 0
          }

          & $wackPath reset
          & $wackPath test -appxpackagepath "$($msix.FullName)" -reportoutputpath "wack-report.xml"

          if (Test-Path "wack-report.xml") {
            Write-Host "WACK report generated successfully"
            Get-Content "wack-report.xml" | Select-Object -First 50
          }

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wack-report
          path: wack-report.xml
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Publish to GitHub Release (Sideload)
    needs: [build, validate]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: msix-installer
          path: msix

      - name: Release to GitHub
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: msix/*.msix
          generate_release_notes: true
          body: |
            ## Conecta Raros ${{ needs.build.outputs.version }} — Windows

            ### Instalacao (Sideloading)
            1. Baixe o arquivo `.msix` abaixo
            2. Clique duas vezes para instalar
            3. Se solicitado, permita a instalacao de apps fora da Store

            ### Requisitos
            - Windows 10 (1809+) ou Windows 11
            - Sideloading habilitado (Configuracoes > Apps > Configuracoes avancadas)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

